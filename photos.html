  <div class="gallery">
    <figure><div class="ph"><img src="images/el-morro-san-juan.jpg" alt="Arms outstretched on the lawn facing Castillo San Felipe del Morro"></div><figcaption>San Juan, Puerto Rico, 2025</figcaption></figure>
    <figure><div class="ph"><img src="images/miami-sunset-pier.jpg" alt="Sunset over a rock jetty stretching into turquoise water"></div><figcaption>Miami, Florida, 2026</figcaption></figure>

<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">&times;</span>
  <img id="lb-img" src="" alt="">
  <div class="lb-cap" id="lb-cap"></div>
</div>

<script>
(function(){
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lb-img');
  var lbCap = document.getElementById('lb-cap');

  function open(img){
    lbImg.src = img.getAttribute('src');
    lbImg.alt = img.getAttribute('alt') || '';
    var fig = img.closest('figure');
    var cap = fig ? fig.querySelector('figcaption') : null;
    lbCap.textContent = cap ? cap.textContent : '';
    lb.classList.add('active');
  }
  function close(){
    lb.classList.remove('active');
    lbImg.src = '';
  }

  document.querySelectorAll('.gallery .ph img').forEach(function(img){
    img.addEventListener('click', function(){ open(img); });
  });
  lb.addEventListener('click', function(e){ if (e.target === lb) close(); });
  document.getElementById('lb-close').addEventListener('click', close);
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
})();
</script>
</body>
</html>
